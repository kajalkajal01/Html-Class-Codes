<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Table</title>
    <style>
        table,th,td{
            border: 1px solid black;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th colspan="5">STUDENT REPORT</th>
        </tr>
        <tr>
            <th rowspan="2">Roll No</th>
            <th rowspan="2">Name</th>
            <th colspan="3">Subject Marks</th>
            <th rowspan="2">Total</th>
            <th rowspan="2">Grade</th>
        </tr>
        <tr>
            <th>Maths</th>
            <th>Sci</th>
            <th>Eng</th>
        </tr>
        <tr>
            <td>101</td>
            <td>Aisha</td>
            <td>85</td>
            <td>90</td>
            <td>88</td>
            <td>263</td>
            <td>A</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Rahul</td>
            <td>78</td>
            <td>82</td>
            <td>80</td>
            <td>240</td>
            <td>B</td>
        </tr>
        <tr>
            <td>103</td>
            <td>Sneha</td>
            <td>92</td>
            <td>88</td>
            <td>95</td>
            <td>275</td>
            <td>A+</td>
        </tr>
        <tr>
            <th colspan="6">Overall Class Result</th>
            <th>Pass</th>
        </tr>
    </table>
</body>
</html>
